name: Build for x86_64

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install LLVM
      run: sudo bash -c "$(wget -O - https://apt.llvm.org/llvm.sh)"
    
    - name: Set up Android NDK r23b
      run: | 
        curl -fLO https://dl.google.com/android/repository/android-ndk-r23b-linux.zip
        unzip -qd . android-ndk-r23b-linux.zip
      
    - name: Build
      run: |
        mkdir build
        cd build
        cmake ..
        make
    - name: Set outputs
      id: vars
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Create Release Zip File
      run: zip -r Wrapper.x86_64.latest.zip rootfs/ wrapper wrapper-rootless Dockerfile compose.yaml entrypoint.sh
      
    - name: Update Tag
      run: |
        git tag -f wrapper.x86_64.latest
        git push origin wrapper.x86_64.latest --force
    - name: Create or Update Release
      uses: softprops/action-gh-release@v2
      with:
        files: Wrapper.x86_64.latest.zip
        body: |
          Latest build for x86_64.
          Commit: ${{ github.sha }}
          Message: ${{ github.event.head_commit.message }}
        name: Wrapper.x86_64.latest
        tag_name: wrapper.x86_64.latest
        make_latest: true
        overwrite: true
